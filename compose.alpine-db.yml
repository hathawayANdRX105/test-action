services:
  redis:
    image: alpine:3.22
    command: >
      sh -lc "apk add --no-cache redis && redis-server --appendonly yes --dir /data --bind 0.0.0.0 --protected-mode no"
    ports:
      - "6379:6379"
    volumes:
      - ./redis:/data
    healthcheck:
      test: "redis-cli ping"
      interval: 5s
      retries: 20

  db:
    image: alpine:3.22
    command: sh /local-postgres.sh
    ports:
      - "5432:5432"
    volumes:
      - ./db:/var/lib/postgresql/data
      - ./scripts/local-postgres.sh:/local-postgres.sh:ro
    healthcheck:
      test: "pg_isready -U postgres -d sharkey_clean"
      interval: 5s
      retries: 20
