    <script id="codex-disable-initial-tutorial-script">
      (() => {
        const TUTORIAL_MARKERS = [
          '时间线的运作方式',
          '观看教学',
          '跳过教学',
          '开始教学',
        ];
        let scheduled = false;

        function textOf(node) {
          return (node?.textContent || '').replace(/\s+/g, ' ').trim();
        }

        function hasTutorialText(node) {
          const text = textOf(node);
          return TUTORIAL_MARKERS.some((marker) => text.includes(marker));
        }

        function isModalLike(node) {
          return Boolean(node?.querySelector?.('[data-cy-modal-window-close]'));
        }

        function blockTutorialModal() {
          document.querySelectorAll('body > div, [role="dialog"], [class*="modal"], [class*="Modal"]').forEach((node) => {
            if (!isModalLike(node) || !hasTutorialText(node)) return;
            node.classList.add('codex-initial-tutorial-blocked');
            node.remove();
          });
        }

        function blockTutorialMenuItem() {
          document.querySelectorAll('button, a, [role="menuitem"], [class*="menu"], [class*="Menu"]').forEach((node) => {
            const text = textOf(node);
            if (!text.includes('观看教学')) return;
            const item = node.closest('[role="menuitem"], li, button, a, [class*="item"], [class*="Item"]') || node;
            item.classList.add('codex-initial-tutorial-blocked');
          });
        }

        function sync() {
          scheduled = false;
          blockTutorialModal();
          blockTutorialMenuItem();
        }

        function scheduleSync() {
          if (scheduled) return;
          scheduled = true;
          window.requestAnimationFrame(sync);
        }

        document.addEventListener('click', (event) => {
          const target = event.target?.closest?.('button, a, [role="menuitem"]');
          if (!target || !textOf(target).includes('观看教学')) return;
          event.preventDefault();
          event.stopImmediatePropagation();
          scheduleSync();
        }, true);

        window.addEventListener('load', () => {
          new MutationObserver(scheduleSync).observe(document.documentElement, { childList: true, subtree: true });
          scheduleSync();
        }, { once: true });
      })();
    </script>
