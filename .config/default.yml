    <script id="codex-home-floating-post-entry-script">
      (() => {
        const ENTRY_ID = 'codex-home-floating-post-entry-button';
        const MOBILE_QUERY = '(max-width: 699px)';
        const media = window.matchMedia(MOBILE_QUERY);
        let scheduled = false;

        function findNativePostButton() {
          return document.querySelector('[data-cy-open-post-form], [class^="mobile-footer-menu-root-"] > [class*="mobile-footer-menu-post-"], [class*=" mobile-footer-menu-root-"] > [class*="mobile-footer-menu-post-"], [class^="mobile-footer-menu-root-"] > button:has(i.ph-pencil-simple), [class*=" mobile-footer-menu-root-"] > button:has(i.ph-pencil-simple), [class^="mobile-footer-menu-root-"] > button:has(i.ti-pencil), [class*=" mobile-footer-menu-root-"] > button:has(i.ti-pencil)');
        }

        function openPostForm() {
          const nativePostButton = findNativePostButton();
          if (nativePostButton) nativePostButton.click();
        }

        function syncEntry() {
          scheduled = false;
          if (!media.matches) {
            document.getElementById(ENTRY_ID)?.remove();
            return;
          }

          const hasTimeline = Boolean(document.querySelector('.pages-timeline-tl-jptQ'));
          const shouldShow = hasTimeline || window.location.pathname === '/';
          if (!shouldShow) {
            document.getElementById(ENTRY_ID)?.remove();
            return;
          }

          if (!hasTimeline && findNativePostButton()) {
            document.getElementById(ENTRY_ID)?.remove();
            return;
          }

          let entry = document.getElementById(ENTRY_ID);
          if (!entry) {
            entry = document.createElement('button');
            entry.id = ENTRY_ID;
            entry.className = 'codex-home-floating-post-entry';
            entry.type = 'button';
            entry.setAttribute('aria-label', '发帖');
            entry.innerHTML = '<i class="navbar-for-mobile-postIcon-E53E ph-pencil-simple ph-bold ph-lg ti-fw" aria-hidden="true"></i>';
            entry.addEventListener('click', openPostForm);
            document.body.appendChild(entry);
          } else if (!entry.querySelector('i')) {
            entry.innerHTML = '<i class="navbar-for-mobile-postIcon-E53E ph-pencil-simple ph-bold ph-lg ti-fw" aria-hidden="true"></i>';
          }
        }

        function scheduleSync() {
          if (scheduled) return;
          scheduled = true;
          window.requestAnimationFrame(syncEntry);
        }

        function start() {
          new MutationObserver(scheduleSync).observe(document.documentElement, { childList: true, subtree: true });
          const originalPushState = history.pushState;
          const originalReplaceState = history.replaceState;
          history.pushState = function (...args) {
            const result = originalPushState.apply(this, args);
            scheduleSync();
            return result;
          };
          history.replaceState = function (...args) {
            const result = originalReplaceState.apply(this, args);
            scheduleSync();
            return result;
          };
          media.addEventListener?.('change', scheduleSync);
          window.addEventListener('popstate', scheduleSync);
          window.addEventListener('resize', scheduleSync, { passive: true });
          scheduleSync();
        }

        window.addEventListener('load', () => {
          window.setTimeout(start, 100);
        }, { once: true });
      })();
    </script>
