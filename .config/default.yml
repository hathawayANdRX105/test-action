            const postText = postButton.querySelector('[class*="navbar-postText-"]');
            if (postText && postText.textContent !== '发帖') postText.textContent = '发帖';

            postButton.classList.remove(OLD_MOVED_CLASS);
            postButton.classList.toggle(MOVED_CLASS, media.matches);

            if (media.matches) {
              const settingsItem = middle.querySelector('a[href="/settings"]');
              if (settingsItem && settingsItem.nextSibling !== postButton) {
                settingsItem.insertAdjacentElement('afterend', postButton);
              } else if (!settingsItem && postButton.parentElement !== middle) {
                middle.appendChild(postButton);
              }
            } else if (postButton.parentElement !== bottom) {
              const accountButton = bottom.querySelector('[class*="navbar-account-"]');
              bottom.insertBefore(postButton, accountButton);
            }
          });
        }

        function scheduleSync() {
          if (scheduled) return;
          scheduled = true;
          window.requestAnimationFrame(syncPostButton);
        }

        function start() {
          new MutationObserver(scheduleSync).observe(document.documentElement, { childList: true, subtree: true });
          media.addEventListener?.('change', scheduleSync);
          window.addEventListener('resize', scheduleSync, { passive: true });
          window.addEventListener('popstate', scheduleSync);
          scheduleSync();
        }

        window.addEventListener('load', () => {
          window.setTimeout(start, 100);
        }, { once: true });
      })();
    </script>
