    <script id="codex-mobile-drawer-header-button-script">
      (() => {
        const MOBILE_QUERY = '(max-width: 1279px)';
        const SOURCE_CLASS = 'codex-mobile-drawer-source';
        const HEADER_READY_CLASS = 'codex-mobile-header-drawer-ready';
        const EMPTY_LEFT_CLASS = 'codex-empty-header-left';
        const TITLE_AFTER_EMPTY_LEFT_CLASS = 'codex-header-title-after-empty-left';
        const TITLE_AFTER_ACTION_LEFT_CLASS = 'codex-header-title-after-action-left';
        const ROUTE_HOME_CLASS = 'codex-route-home';
        const ROUTE_NOTIFICATIONS_CLASS = 'codex-route-notifications';
        const ROUTE_SEARCH_CLASS = 'codex-route-search';
        const ROUTE_EXPLORE_CLASS = 'codex-route-explore';
        const ROUTE_ANNOUNCEMENTS_CLASS = 'codex-route-announcements';
        const ROUTE_USER_CLASS = 'codex-route-user';
        const ROUTE_SETTINGS_CLASS = 'codex-route-settings';
        const OBSERVER_OPTIONS = { childList: true, subtree: true };
        const media = window.matchMedia(MOBILE_QUERY);
        let scheduled = false;
        let observer;
        let lastPath = window.location.pathname;

        function hasClassPart(el, part) {
          return el instanceof Element && Array.from(el.classList).some((name) => name.includes(part));
        }

        function findFooterDrawerButton() {
          const buttons = document.querySelectorAll([
            '[class^="mobile-footer-menu-root-"] > button',
            '[class*=" mobile-footer-menu-root-"] > button',
          ].join(','));

          return Array.from(buttons).find((button) => {
            return hasClassPart(button, 'mobile-footer-menu-item-') && button.querySelector('i.ph-list, i.ti-menu-2');
          });
        }

        function findHeaderAvatarSlot() {
          const slots = document.querySelectorAll([
            '[class^="MkPageHeader-buttonsLeft-"]',
            '[class*=" MkPageHeader-buttonsLeft-"]',
          ].join(','));

          return Array.from(slots).find((el) => {
            if (!hasClassPart(el, 'MkPageHeader-buttonsLeft-')) return false;
            if (el.querySelector('button, a')) return false;
            return Boolean(el.querySelector('[class*="MkPageHeader-avatar-"], [class*="MkAvatar-root-"]'));
          });
        }

        function isEmptyHeaderLeftSlot(slot) {
          return hasClassPart(slot, 'MkPageHeader-buttonsLeft-') &&
            !slot.querySelector('button, a, span:not(:empty), [class*="MkAvatar-root-"]');
        }

        function syncEmptyHeaderLeftSlots() {
          const slots = document.querySelectorAll([
            '[class^="MkPageHeader-buttonsLeft-"]',
            '[class*=" MkPageHeader-buttonsLeft-"]',
          ].join(','));

          slots.forEach((el) => {
            if (!hasClassPart(el, 'MkPageHeader-buttonsLeft-')) return;

            const isEmpty = isEmptyHeaderLeftSlot(el);
            el.classList.toggle(EMPTY_LEFT_CLASS, isEmpty);

            const upper = el.parentElement;
            const title = upper ? Array.from(upper.children).find((child) => hasClassPart(child, 'MkPageHeader-titleContainer-')) : null;
            if (title) {
              const isSlim = hasClassPart(upper, 'MkPageHeader-slim-');
              const hasRealButton = Boolean(el.querySelector('button'));
              title.classList.toggle(TITLE_AFTER_EMPTY_LEFT_CLASS, isEmpty);
              title.classList.toggle(TITLE_AFTER_ACTION_LEFT_CLASS, !isEmpty && isSlim && hasRealButton);
            }
          });
        }

        function isRelevantMutationNode(node) {
          if (!(node instanceof Element)) return false;
          if (
            hasClassPart(node, 'mobile-footer-menu-root-') ||
            hasClassPart(node, 'mobile-footer-menu-item-') ||
            hasClassPart(node, 'MkPageHeader-buttonsLeft-') ||
            hasClassPart(node, 'MkPageHeader-titleContainer-') ||
            hasClassPart(node, 'MkPageHeader-upper-')
          ) {
            return true;
          }

          return Boolean(node.querySelector([
            '[class^="mobile-footer-menu-root-"]',
            '[class*=" mobile-footer-menu-root-"]',
            '[class^="MkPageHeader-buttonsLeft-"]',
            '[class*=" MkPageHeader-buttonsLeft-"]',
            '[class^="MkPageHeader-titleContainer-"]',
            '[class*=" MkPageHeader-titleContainer-"]',
          ].join(',')));
        }

        function scheduleSyncForMutations(mutations) {
          if (mutations.some((mutation) => {
            return isRelevantMutationNode(mutation.target) ||
              Array.from(mutation.addedNodes).some(isRelevantMutationNode) ||
              Array.from(mutation.removedNodes).some(isRelevantMutationNode);
          })) {
            scheduleSync();
          }
        }

        function syncHeaderDrawerButton() {
          scheduled = false;
          observer?.disconnect();

          try {
            const currentPath = window.location.pathname;
            lastPath = currentPath;
            document.body?.classList.toggle(ROUTE_HOME_CLASS, currentPath === '/');
            document.body?.classList.toggle(ROUTE_NOTIFICATIONS_CLASS, currentPath.startsWith('/my/notifications') || currentPath === '/notifications');
            document.body?.classList.toggle(ROUTE_SEARCH_CLASS, currentPath.startsWith('/search'));
            document.body?.classList.toggle(ROUTE_EXPLORE_CLASS, currentPath.startsWith('/explore'));
            document.body?.classList.toggle(ROUTE_ANNOUNCEMENTS_CLASS, currentPath.startsWith('/announcements'));
            document.body?.classList.toggle(ROUTE_USER_CLASS, /^\/@[^/]+/.test(currentPath));
            document.body?.classList.toggle(ROUTE_SETTINGS_CLASS, currentPath.startsWith('/settings'));
            syncEmptyHeaderLeftSlots();

            document.querySelectorAll(`.${SOURCE_CLASS}`).forEach((el) => {
              el.classList.remove(SOURCE_CLASS);
            });
            document.body?.classList.remove(HEADER_READY_CLASS);
          } finally {
            observer?.observe(document.documentElement, OBSERVER_OPTIONS);
          }
        }

        function scheduleSync() {
          if (scheduled) return;
          scheduled = true;
          window.setTimeout(() => {
            window.requestAnimationFrame(syncHeaderDrawerButton);
          }, 0);
        }

        function scheduleSyncIfPathChanged() {
          if (window.location.pathname === lastPath) return;
          lastPath = window.location.pathname;
          scheduleSync();
        }

        function start() {
          observer = new MutationObserver(scheduleSyncForMutations);
          observer.observe(document.documentElement, OBSERVER_OPTIONS);

          const originalPushState = history.pushState;
          const originalReplaceState = history.replaceState;
          history.pushState = function (...args) {
            const result = originalPushState.apply(this, args);
            scheduleSync();
            return result;
          };
          history.replaceState = function (...args) {
            const result = originalReplaceState.apply(this, args);
            scheduleSync();
            return result;
          };

          media.addEventListener?.('change', scheduleSync);
          window.addEventListener('resize', scheduleSync, { passive: true });
          window.addEventListener('popstate', scheduleSync);
          window.addEventListener('hashchange', scheduleSync);
          document.addEventListener('visibilitychange', scheduleSync);
          window.setInterval(scheduleSyncIfPathChanged, 500);
          scheduleSync();
        }

        window.addEventListener('load', () => {
          window.setTimeout(start, 100);
        }, { once: true });
      })();
    </script>
