# Use host node_modules from CI/local `pnpm i` (setup-ci already ran).
# In-container pnpm install fails: @transfem-org/summaly is only on
# activitypub.software (not npmjs), and full install OOMs.
services:
  setup:
    volumes:
      - type: bind
        source: ../../../node_modules
        target: /misskey/node_modules
        read_only: true
      - type: bind
        source: ../node_modules
        target: /misskey/packages/backend/node_modules
        read_only: true
      - type: bind
        source: ../../misskey-js/node_modules
        target: /misskey/packages/misskey-js/node_modules
        read_only: true
      - type: bind
        source: ../../misskey-reversi/node_modules
        target: /misskey/packages/misskey-reversi/node_modules
        read_only: true
      - type: bind
        source: ../../megalodon/node_modules
        target: /misskey/packages/megalodon/node_modules
        read_only: true
      - type: bind
        source: ../../stub
        target: /misskey/packages/stub
        read_only: true

  tester:
    networks:
      external_network:
      internal_network:
        ipv4_address: 172.20.1.1
    volumes:
      - type: bind
        source: ../../../node_modules
        target: /misskey/node_modules
        read_only: true
      - type: bind
        source: ../node_modules
        target: /misskey/packages/backend/node_modules
        read_only: true
      - type: bind
        source: ../../misskey-js/node_modules
        target: /misskey/packages/misskey-js/node_modules
        read_only: true
      - type: bind
        source: ../../stub
        target: /misskey/packages/stub
        read_only: true

  daemon:
    networks:
      - external_network
      - internal_network_a
      - internal_network_b
    volumes:
      - type: bind
        source: ../../../node_modules
        target: /misskey/node_modules
        read_only: true
      - type: bind
        source: ../node_modules
        target: /misskey/packages/backend/node_modules
        read_only: true
      - type: bind
        source: ../../stub
        target: /misskey/packages/stub
        read_only: true

  redis.test:
    networks:
      - internal_network_a
      - internal_network_b

  a.test:
    networks:
      - internal_network

  misskey.a.test:
    networks:
      - external_network
      - internal_network
    volumes:
      - type: bind
        source: ../../../node_modules
        target: /misskey/node_modules
        read_only: true
      - type: bind
        source: ../node_modules
        target: /misskey/packages/backend/node_modules
        read_only: true
      - type: bind
        source: ../../misskey-js/node_modules
        target: /misskey/packages/misskey-js/node_modules
        read_only: true
      - type: bind
        source: ../../misskey-reversi/node_modules
        target: /misskey/packages/misskey-reversi/node_modules
        read_only: true
      - type: bind
        source: ../../megalodon/node_modules
        target: /misskey/packages/megalodon/node_modules
        read_only: true
      - type: bind
        source: ../../stub
        target: /misskey/packages/stub
        read_only: true

  b.test:
    networks:
      - internal_network

  misskey.b.test:
    networks:
      - external_network
      - internal_network
    volumes:
      - type: bind
        source: ../../../node_modules
        target: /misskey/node_modules
        read_only: true
      - type: bind
        source: ../node_modules
        target: /misskey/packages/backend/node_modules
        read_only: true
      - type: bind
        source: ../../misskey-js/node_modules
        target: /misskey/packages/misskey-js/node_modules
        read_only: true
      - type: bind
        source: ../../misskey-reversi/node_modules
        target: /misskey/packages/misskey-reversi/node_modules
        read_only: true
      - type: bind
        source: ../../megalodon/node_modules
        target: /misskey/packages/megalodon/node_modules
        read_only: true
      - type: bind
        source: ../../stub
        target: /misskey/packages/stub
        read_only: true

networks:
  external_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16
          ip_range: 172.23.0.0/24
  internal_network:
    internal: true
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          ip_range: 172.20.0.0/24
