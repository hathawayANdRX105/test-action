include:
  - ./compose.a.yml
  - ./compose.b.yml

services:
  setup:
    extends:
      file: ./compose.tpl.yml
      service: misskey
    # Host node_modules bind-mounted (compose.override.yaml). No in-container install.
    command: >
      bash -c "
        test -d /misskey/node_modules
        test -d /misskey/packages/backend/node_modules
        test -e /misskey/packages/backend/node_modules/@misskey-dev/summaly || test -e /misskey/node_modules/@misskey-dev/summaly
        echo 'federation setup: host node_modules OK'
      "

  tester:
    image: node:${NODE_VERSION}
    depends_on:
      a.test:
        condition: service_healthy
      misskey.a.test:
        condition: service_healthy
      b.test:
        condition: service_healthy
      misskey.b.test:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - NODE_EXTRA_CA_CERTS=/usr/local/share/ca-certificates/rootCA.crt
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - type: bind
        source: ../package.json
        target: /misskey/packages/backend/package.json
        read_only: true
      - type: bind
        source: ../test/resources
        target: /misskey/packages/backend/test/resources
        read_only: true
      - type: bind
        source: ./test
        target: /misskey/packages/backend/test-federation/test
        read_only: true
      - type: bind
        source: ../jest.config.common.ts
        target: /misskey/packages/backend/jest.config.common.ts
        read_only: true
      - type: bind
        source: ../jest.config.fed.ts
        target: /misskey/packages/backend/jest.config.fed.ts
        read_only: true
      - type: bind
        source: ../jest.js
        target: /misskey/packages/backend/jest.js
        read_only: true
      - type: bind
        source: ../../misskey-js/built
        target: /misskey/packages/misskey-js/built
        read_only: true
      - type: bind
        source: ../../misskey-js/package.json
        target: /misskey/packages/misskey-js/package.json
        read_only: true
      - type: bind
        source: ../../../package.json
        target: /misskey/package.json
        read_only: true
      - type: bind
        source: ../../../pnpm-lock.yaml
        target: /misskey/pnpm-lock.yaml
        read_only: true
      - type: bind
        source: ../../../pnpm-workspace.yaml
        target: /misskey/pnpm-workspace.yaml
        read_only: true
      - type: bind
        source: ../../shared
        target: /misskey/packages/shared
        read_only: true
      - type: bind
        source: ../../../locales
        target: /misskey/locales
        read_only: true
      - type: bind
        source: ./certificates/rootCA.crt
        target: /usr/local/share/ca-certificates/rootCA.crt
        read_only: true
    working_dir: /misskey
    entrypoint: ["bash", "-lc"]
    command: ["cp /usr/local/share/ca-certificates/rootCA.crt /usr/local/share/ca-certificates/misskey-rootCA.crt 2>/dev/null || true; (command -v update-ca-certificates >/dev/null && update-ca-certificates) || true; corepack enable && corepack prepare pnpm@10.26.2 --activate && pnpm -F backend jest:fed"]
  daemon:
    image: node:${NODE_VERSION}
    depends_on:
      redis.test:
        condition: service_healthy
    volumes:
      - type: bind
        source: ../package.json
        target: /misskey/packages/backend/package.json
        read_only: true
      - type: bind
        source: ./daemon.ts
        target: /misskey/packages/backend/test-federation/daemon.ts
        read_only: true
      - type: bind
        source: ./tsconfig.json
        target: /misskey/packages/backend/test-federation/tsconfig.json
        read_only: true
      - type: bind
        source: ../../../package.json
        target: /misskey/package.json
        read_only: true
      - type: bind
        source: ../../../pnpm-lock.yaml
        target: /misskey/pnpm-lock.yaml
        read_only: true
      - type: bind
        source: ../../../pnpm-workspace.yaml
        target: /misskey/pnpm-workspace.yaml
        read_only: true
      - type: bind
        source: ../../shared
        target: /misskey/packages/shared
        read_only: true
      - type: bind
        source: ../../../locales
        target: /misskey/locales
        read_only: true
    working_dir: /misskey
    command: >
      bash -c "
        npm install -g pnpm
        pnpm exec tsc -p ./packages/backend/test-federation
        node ./packages/backend/test-federation/built/daemon.js
      "

  redis.test:
    image: redis:7-alpine
    volumes:
      - type: bind
        source: ./volumes/redis
        target: /data
        bind:
          create_host_path: true
    healthcheck:
      test: redis-cli ping
      interval: 5s
      retries: 20
